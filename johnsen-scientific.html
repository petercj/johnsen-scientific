<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Johnsen Scientific</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cormorant Garamond', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #fff;
            color: #1a1a1a;
            text-align: center;
            padding: 2rem;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(circle, rgba(0,0,0,0.08) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 0;
        }
        .container {
            max-width: 600px;
            position: relative;
            z-index: 1;
        }
        h1 {
            font-size: min(5rem, 10vw);
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 2.5rem;
            white-space: nowrap;
        }
        .divider {
            width: 100%;
            height: 1px;
            margin: 0 auto 2rem;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.4), transparent);
        }
        p {
            font-size: 1.15rem;
            color: #555;
            margin-bottom: 0.8rem;
        }
        a {
            color: #1a1a1a;
            text-decoration: none;
            font-size: 0.95rem;
            border-bottom: 1px solid #ccc;
            padding-bottom: 2px;
            transition: border-color 0.2s;
        }
        a:hover {
            border-color: #1a1a1a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Johnsen Scientific</h1>
        <div class="divider"></div>
        <p>Scientific &amp; Technical Consulting</p>
        <a href="https://www.linkedin.com/in/petercjohnsen">LinkedIn</a>
    </div>
</body>
</html>
